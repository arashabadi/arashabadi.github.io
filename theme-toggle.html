<script>
(function () {
  function createThemeToggle() {
    if (document.querySelector('.theme-toggle')) return;

    const target = document.querySelector('.quarto-navbar-tools') || document.querySelector('.navbar .navbar-container');
    if (!target) return;

    const button = document.createElement('button');
    button.className = 'theme-toggle';
    button.type = 'button';
    button.innerHTML = '<i class="bi bi-sun-fill theme-toggle-sun" aria-hidden="true"></i><i class="bi bi-moon-stars-fill theme-toggle-moon" aria-hidden="true"></i>';
    button.addEventListener('click', window.toggleTheme);
    target.appendChild(button);
  }

  function applyTheme(theme) {
    const isLight = theme === 'light';
    document.body.classList.toggle('light-mode', isLight);
    document.body.classList.toggle('dark-mode', !isLight);

    document.querySelectorAll('.theme-toggle').forEach((button) => {
      button.setAttribute('aria-label', isLight ? 'Switch to night theme' : 'Switch to day theme');
      button.setAttribute('title', isLight ? 'Switch to night theme' : 'Switch to day theme');
    });
  }

  window.toggleTheme = function () {
    const nextTheme = document.body.classList.contains('light-mode') ? 'dark' : 'light';
    applyTheme(nextTheme);
  };

  window.copyContactValue = async function (button) {
    const value = button.dataset.copyValue;
    const originalLabel = button.dataset.originalLabel || button.getAttribute('aria-label');
    const originalTitle = button.dataset.originalTitle || button.getAttribute('title');
    const originalHtml = button.dataset.originalHtml || button.innerHTML;

    button.dataset.originalLabel = originalLabel;
    button.dataset.originalTitle = originalTitle;
    button.dataset.originalHtml = originalHtml;

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(value);
      } else {
        const field = document.createElement('textarea');
        field.value = value;
        field.setAttribute('readonly', '');
        field.style.position = 'fixed';
        field.style.opacity = '0';
        field.style.top = '0';
        document.body.appendChild(field);
        field.focus();
        field.select();
        field.setSelectionRange(0, value.length);
        if (!document.execCommand('copy')) {
          throw new Error('Copy command failed');
        }
        document.body.removeChild(field);
      }

      button.classList.add('is-copied');
      button.innerHTML = '<i class="fa-solid fa-check" aria-hidden="true"></i>';
      button.setAttribute('aria-label', 'Copied');
      button.setAttribute('title', 'Copied');
    } catch (error) {
      button.setAttribute('aria-label', 'Copy failed');
      button.setAttribute('title', 'Copy failed');
    }

    window.clearTimeout(button.copyResetTimer);
    button.copyResetTimer = window.setTimeout(function () {
      button.classList.remove('is-copied');
      button.innerHTML = originalHtml;
      button.setAttribute('aria-label', originalLabel);
      button.setAttribute('title', originalTitle);
    }, 1500);
  };

  createThemeToggle();
  applyTheme('dark');
})();
</script>
