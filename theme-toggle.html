<script>
(function () {
  function createThemeToggle() {
    if (document.querySelector('.theme-toggle')) return;

    const target = document.querySelector('.quarto-navbar-tools') || document.querySelector('.navbar .navbar-container');
    if (!target) return;

    const button = document.createElement('button');
    button.className = 'theme-toggle';
    button.type = 'button';
    button.innerHTML = '<i class="bi bi-sun-fill theme-toggle-sun" aria-hidden="true"></i><i class="bi bi-moon-stars-fill theme-toggle-moon" aria-hidden="true"></i>';
    button.addEventListener('click', window.toggleTheme);
    target.appendChild(button);
  }

  function applyTheme(theme) {
    const isLight = theme === 'light';
    document.body.classList.toggle('light-mode', isLight);
    document.body.classList.toggle('dark-mode', !isLight);

    document.querySelectorAll('.theme-toggle').forEach((button) => {
      button.setAttribute('aria-label', isLight ? 'Switch to night theme' : 'Switch to day theme');
      button.setAttribute('title', isLight ? 'Switch to night theme' : 'Switch to day theme');
    });
  }

  window.toggleTheme = function () {
    const nextTheme = document.body.classList.contains('light-mode') ? 'dark' : 'light';
    applyTheme(nextTheme);
  };

  createThemeToggle();
  applyTheme('dark');
})();
</script>
